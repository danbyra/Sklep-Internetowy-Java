<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyShop</title>
    <link rel="stylesheet" type="text/css" href="/css/style.css">
</head>
<body>
<header th:replace="fragments/header::ShopHeader"></header>>
    <div class="main-content">

        <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">

            <table cellspacing="0">
                <tr th:each="cartItem,stat: ${@cart.cartItems}">
                    <td th:text="${stat.count}">1</td>
                    <td>
                        <img th:src="${cartItem.item.imageURL}">
                    </td>
                    <td th:text="${cartItem.item.name}">Nazwa produktu</td>
                    <td th:text="${cartItem.item.price}">0.00</td>
                    <td>
                        <a class="btn" th:href="@{/order/cart/decrease/{id}(id=${cartItem.item.id})}">−</a>
                        <span th:text="${cartItem.counter}"></span>
                        <a class="btn" th:href="@{/order/cart/increase/{id}(id=${cartItem.item.id})}">+</a>
                    </td>

                    <td th:text="${cartItem.price}">0.00</td>

                    <td>
                        <a class="btn" th:href="@{/order/cart/remove/{id}(id=${cartItem.item.id})}">X</a>
                    </td>
                </tr>
            </table>

            <div class="summary">
                <p><span>Do zapłaty </span><span th:text="${@cart.sum}">0.00</span>zł</p>
            </div>
            <a th:href="@{/summary}" class="add-btn">Dalej</a>
        </div>
    </div>
</body>
</html>
