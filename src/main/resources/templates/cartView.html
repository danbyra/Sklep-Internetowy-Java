<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyShop</title>
    <link rel="stylesheet" type="text/css" href="/css/style.css">
</head>
<body>
<header th:replace="fragments/header::ShopHeader"></header>>
    <div class="main-content">

        <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">

            <table cellspacing="0">
                <tr th:each="item, stat : ${session.cart}">
                    <td th:text="${stat.count}">1</td>
                    <td>
                        <img th:src="${item.imageURL}">
                    </td>
                    <td th:text="${item.name}">Nazwa produktu</td>
                    <td>1 szt.</td>
                    <td th:text="${item.price}">0.00</td>
                </tr>
            </table>

            <div class="summary">
                <p><span>Do zapłaty </span><span th:text="${session.total != null ? session.total: '0.00'}"></span>zł</p>
            </div>
            <a href="" class="add-btn">Dalej</a>
        </div>
    </div>
</body>
</html>
